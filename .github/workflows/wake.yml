name: Keep App Awake

on:
  schedule:
    # This runs every 6 hours (UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # This adds a manual "Run" button for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send a ping to Streamlit
        run: curl -I https://stock-predictor-1910.streamlit.app
